<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập Part 1</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Thanh tiến trình */
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #e9ecef;
            position: fixed;
            top: 0;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .quiz-container {
            max-width: 600px;
            width: 90%;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .question-info {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 15px;
        }

        #question-image {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            padding: 15px;
            font-size: 16px;
            font-weight: 500;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: #f0f7ff;
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white;
            border-color: var(--error-color);
        }

        #next-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* Chỉ hiện sau khi trả lời */
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="quiz-container">
        <div class="question-info" id="question-number">Câu hỏi 1/10</div>
        
        <img id="question-image" src="" alt="Câu hỏi hình ảnh">
        
        <div class="options-grid" id="options-container">
            </div>

        <button id="next-btn" onclick="nextQuestion()">Câu tiếp theo ➔</button>
    </div>

    <script>
        let quizSet = [];
        let currentIndex = 0;
        let score = 0;

        document.addEventListener('DOMContentLoaded', () => {
            const rawSatisfied = localStorage.getItem('satisfiedData');
            const rawUnique = localStorage.getItem('uniquePhrases');

            if (!rawSatisfied || !rawUnique) {
                alert("Không tìm thấy dữ liệu. Quay lại trang chủ.");
                window.location.href = 'index.html';
                return;
            }

            const satisfiedData = JSON.parse(rawSatisfied);
            const uniquePhrases = JSON.parse(rawUnique);

            // 1. Tạo bộ câu hỏi
            quizSet = generateQuiz(satisfiedData, uniquePhrases);
            
            // 2. Hiển thị câu đầu tiên
            renderQuestion();
        });

        function generateQuiz(satisfiedData, phrases) {
            const set = [];
            const total = satisfiedData.length * 2;

            for (let i = 0; i < total; i++) {
                const current = satisfiedData[i % satisfiedData.length];
                const correctAnswer = current.phrase;

                // 2 đáp án nhiễu từ satisfiedData
                let wrongSatisfied = [...new Set(satisfiedData
                    .filter(item => item.phrase !== correctAnswer)
                    .map(item => item.phrase))]
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 2);

                // 1 đáp án nhiễu từ uniquePhrases
                let wrongUnique = phrases
                    .filter(p => p !== correctAnswer && !wrongSatisfied.includes(p))
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 1);

                // Gộp 4 lựa chọn và trộn ngẫu nhiên
                const options = [correctAnswer, ...wrongSatisfied, ...wrongUnique]
                    .sort(() => Math.random() - 0.5);

                set.push({
                    image: current.image,
                    answer: correctAnswer,
                    options: options
                });
            }
            return set;
        }

        function renderQuestion() {
            const currentTask = quizSet[currentIndex];
            const optionsContainer = document.getElementById('options-container');
            const nextBtn = document.getElementById('next-btn');

            // Cập nhật giao diện
            document.getElementById('question-image').src = currentTask.image;
            document.getElementById('question-number').innerText = `Câu hỏi ${currentIndex + 1}/${quizSet.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex) / quizSet.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            nextBtn.style.display = 'none';

            // Tạo các nút đáp án
            currentTask.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(btn, option, currentTask.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedValue, correctAnswer) {
            const buttons = document.querySelectorAll('.option-btn');
            
            // Vô hiệu hóa tất cả các nút sau khi đã chọn
            buttons.forEach(btn => btn.disabled = true);

            if (selectedValue === correctAnswer) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                // Hiển thị đáp án đúng để người dùng học
                buttons.forEach(btn => {
                    if (btn.innerText === correctAnswer) btn.classList.add('correct');
                });
            }

            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizSet.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const container = document.querySelector('.quiz-container');
            const percent = Math.round((score / quizSet.length) * 100);
            
            container.innerHTML = `
                <h2>Hoàn thành bài tập!</h2>
                <div style="font-size: 48px; margin: 20px 0;">${percent}%</div>
                <p>Bạn trả lời đúng ${score}/${quizSet.length} câu hỏi.</p>
                <button onclick="location.reload()" style="padding: 10px 20px; cursor:pointer;">Làm lại</button>
                <button onclick="window.location.href='index.html'" style="padding: 10px 20px; cursor:pointer; margin-left:10px;">Về trang chủ</button>
            `;
            document.getElementById('progress-bar').style.width = '100%';
        }
    </script>
</body>
</html>
